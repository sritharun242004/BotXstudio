<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8B5CF6" />

    <!-- Defense-in-depth: strip referrer so URLs (including OAuth ?code=) -->
    <!-- never leak to third-party hosts via the Referer header.            -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Speed up image loading: open the S3 TLS connection in parallel
         with the API call that returns the image URLs. Saves ~150ms on
         the first image fetch (no DNS + TLS handshake when the URL arrives). -->
    <link rel="preconnect" href="https://botxstudio.s3.us-east-1.amazonaws.com" crossorigin />
    <link rel="dns-prefetch" href="https://botxstudio.s3.us-east-1.amazonaws.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Primary meta -->
    <title>Botzudio — AI Fashion Model Shots in 60 Seconds</title>
    <meta name="description" content="Upload a garment photo and get studio-quality model shots instantly. No photographer, no studio. Built for Indian fashion sellers on Myntra, Meesho & Amazon." />
    <meta name="keywords" content="AI fashion photography, model shots, product photography, ecommerce images, Myntra, Meesho, Amazon, garment photos, Botzudio" />
    <meta name="author" content="The Bot Company" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook / WhatsApp / iMessage -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://botzudio.com/" />
    <meta property="og:site_name" content="Botzudio" />
    <meta property="og:title" content="Botzudio — AI Fashion Model Shots in 60 Seconds" />
    <meta property="og:description" content="Upload a garment photo and get studio-quality model shots instantly. No photographer, no studio. Built for Indian fashion sellers on Myntra, Meesho &amp; Amazon." />
    <meta property="og:image" content="https://botzudio.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Botzudio — AI fashion model shots from garment photos" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@thebotcompany" />
    <meta name="twitter:creator" content="@thebotcompany" />
    <meta name="twitter:title" content="Botzudio — AI Fashion Model Shots in 60 Seconds" />
    <meta name="twitter:description" content="Upload a garment photo and get studio-quality model shots instantly. No photographer, no studio. Built for Indian fashion sellers." />
    <meta name="twitter:image" content="https://botzudio.com/og-image.png" />
    <meta name="twitter:image:alt" content="Botzudio — AI fashion model shots from garment photos" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
