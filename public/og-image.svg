<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg1" cx="15%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFDF5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFDF5" stop-opacity="0"/>
    </radialGradient>
    <!-- dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#1E293B" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#FFFDF5"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Border -->
  <rect x="24" y="24" width="1152" height="582" rx="24" fill="none" stroke="#1E293B" stroke-width="3" opacity="0.12"/>

  <!-- BZ logo box -->
  <rect x="80" y="220" width="88" height="88" rx="18" fill="#8B5CF6"/>
  <!-- Shadow offset -->
  <rect x="84" y="224" width="88" height="88" rx="18" fill="#1E293B" opacity="0.18"/>
  <rect x="80" y="220" width="88" height="88" rx="18" fill="#8B5CF6"/>
  <text x="124" y="278" font-family="'Outfit', Arial Black, sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle" letter-spacing="-1.5">BZ</text>

  <!-- Brand name -->
  <text x="184" y="265" font-family="'Outfit', Arial Black, sans-serif" font-weight="900" font-size="52" fill="#1E293B" letter-spacing="-2">Botzudio</text>
  <text x="184" y="298" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="500" font-size="20" fill="#64748B" letter-spacing="0">by The Bot Company</text>

  <!-- Divider -->
  <line x1="80" y1="345" x2="480" y2="345" stroke="#1E293B" stroke-width="2.5" opacity="0.15"/>

  <!-- Headline -->
  <text x="80" y="410" font-family="'Outfit', Arial Black, sans-serif" font-weight="900" font-size="52" fill="#1E293B" letter-spacing="-2">Your photos are</text>
  <text x="80" y="470" font-family="'Outfit', Arial Black, sans-serif" font-weight="900" font-size="52" fill="#8B5CF6" letter-spacing="-2">holding back your sales.</text>

  <!-- Subtext -->
  <text x="80" y="520" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="500" font-size="22" fill="#64748B">AI fashion model shots in under 60 seconds — no studio needed.</text>

  <!-- Right side: 3 feature pills -->
  <g transform="translate(760, 200)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="360" height="70" rx="14" fill="white" stroke="#1E293B" stroke-width="2.5"/>
    <rect x="3" y="3" width="360" height="70" rx="14" fill="none" stroke="#1E293B" stroke-width="2.5" opacity="0.1"/>
    <rect x="0" y="0" width="4" height="70" rx="2" fill="#8B5CF6"/>
    <text x="24" y="32" font-family="'Outfit', Arial, sans-serif" font-weight="800" font-size="17" fill="#1E293B">Upload garment photo</text>
    <text x="24" y="54" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="500" font-size="13" fill="#64748B">Flat lay or hanger — phone camera works</text>

    <!-- Card 2 -->
    <rect x="0" y="88" width="360" height="70" rx="14" fill="white" stroke="#1E293B" stroke-width="2.5"/>
    <rect x="0" y="88" width="4" height="70" rx="2" fill="#EC4899"/>
    <text x="24" y="120" font-family="'Outfit', Arial, sans-serif" font-weight="800" font-size="17" fill="#1E293B">Pick pose &amp; model</text>
    <text x="24" y="142" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="500" font-size="13" fill="#64748B">Choose from presets or describe your vision</text>

    <!-- Card 3 -->
    <rect x="0" y="176" width="360" height="70" rx="14" fill="white" stroke="#1E293B" stroke-width="2.5"/>
    <rect x="0" y="176" width="4" height="70" rx="2" fill="#10B981"/>
    <text x="24" y="208" font-family="'Outfit', Arial, sans-serif" font-weight="800" font-size="17" fill="#1E293B">Download studio shot</text>
    <text x="24" y="230" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="500" font-size="13" fill="#64748B">Ready for Myntra, Meesho, Amazon &amp; more</text>

    <!-- CTA badge -->
    <rect x="60" y="276" width="240" height="48" rx="24" fill="#8B5CF6" stroke="#1E293B" stroke-width="2.5"/>
    <rect x="63" y="279" width="240" height="48" rx="24" fill="none" stroke="#1E293B" stroke-width="2" opacity="0.15"/>
    <text x="180" y="307" font-family="'Outfit', Arial, sans-serif" font-weight="800" font-size="17" fill="white" text-anchor="middle" letter-spacing="0.3">Start Free — 30 Credits</text>
  </g>

  <!-- Bottom domain -->
  <text x="80" y="592" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-weight="600" font-size="15" fill="#94A3B8">botzudio.thebotcompany.in</text>
</svg>
