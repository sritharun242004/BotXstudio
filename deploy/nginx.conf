server {
    listen 80;
    server_name _;  # Replace _ with your domain name if you have one

    # Max upload size (for base64 image payloads)
    client_max_body_size 30M;

    # Proxy API requests to Node.js
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Serve frontend static files
    location /ecommerce-scene-generator {
        alias /var/www/botstudiox/docs;
        try_files $uri $uri/ /ecommerce-scene-generator/index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirect root to app
    location = / {
        return 301 /ecommerce-scene-generator;
    }
}
