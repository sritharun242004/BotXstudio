# Both domains redirect HTTP → HTTPS
server {
    listen 80;
    server_name botzudio.com admin.botzudio.com;
    return 301 https://$host$request_uri;
}

# ─── Main domain: botzudio.com ────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name botzudio.com;

    # Cert covers both botzudio.com and admin.botzudio.com after `certbot --expand`
    ssl_certificate /etc/letsencrypt/live/botzudio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/botzudio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 30M;

    # Block admin paths on the main domain — admin lives on admin.botzudio.com.
    # The React app additionally redirects, but blocking here is defense-in-depth
    # against direct API or static asset probing.
    location = /admin       { return 301 https://admin.botzudio.com/admin; }
    location = /admin/login { return 301 https://admin.botzudio.com/admin/login; }

    # Proxy API requests to Node.js
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Serve frontend static files
    location / {
        root /var/www/botstudiox/docs;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

# ─── Admin subdomain: admin.botzudio.com ──────────────────────────────────────
server {
    listen 443 ssl;
    server_name admin.botzudio.com;

    ssl_certificate /etc/letsencrypt/live/botzudio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/botzudio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 30M;

    # API endpoints reach the same Express server. Bearer auth + ADMIN_EMAILS
    # allowlist gate admin endpoints regardless of which host the call came from.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Serve SPA for admin routes + universal auth routes (login/callback).
    # Anything else gets 301'd to the main domain at nginx level so there is
    # no SPA flash for users typing https://admin.botzudio.com directly.
    # `^~` tells nginx: if this prefix matches, stop here (don't fall back to
    # the catch-all `/` redirect). The named @spa location serves index.html
    # directly without triggering another round of location matching (which
    # would cause a 301 loop with location /).
    location ^~ /admin         { try_files $uri @spa; }
    location ^~ /auth/callback { try_files $uri @spa; }
    location ^~ /login         { try_files $uri @spa; }

    location @spa {
        root /var/www/botstudiox/docs;
        try_files /index.html =404;
    }

    # Static assets used by the admin SPA (JS, CSS, fonts, images)
    location /assets/ {
        root /var/www/botstudiox/docs;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Top-level static files referenced by index.html (favicons, og-image, logo)
    location ~* ^/[^/]+\.(png|svg|ico|webp|jpg)$ {
        root /var/www/botstudiox/docs;
        expires 30d;
    }

    # Bare root on admin subdomain → admin login (user's natural expectation
    # when typing admin.botzudio.com). Subtle: matching `=` ensures this only
    # catches exactly "/", not any other prefix.
    location = / {
        return 301 https://admin.botzudio.com/admin;
    }

    # Everything else (/blog, /compare, /app, /r/, etc.) → main domain
    location / {
        return 301 https://botzudio.com$request_uri;
    }
}
